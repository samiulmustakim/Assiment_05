<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue</title>
    <link rel="icon" href="./assets/github-logo.png" />

    <!-- daisy Ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina+2:wght@400..800&family=Comfortaa:wght@300..700&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body>
    <main class="bg-slate-100 min-h-screen md:pt-15 p-3">
      <div class="md:w-9/12 mx-auto">
        <!-- Nav Btn Nav Btn Nav Btn Nav Btn  -->
        <div
          class="flex bg-white rounded-lg items-center justify-between p-7 shadow-sm flex-col gap-8 lg:flex-row"
        >
          <div class="flex gap-3 flex-col sm:flex-row flex-wrap">
            <button id="all-btn" class="btn btn-primary w-25 filter-btn">All</button>
            <button id="open-btn" class="btn w-25 filter-btn">Open</button>
            <button id="closed-btn" class="btn w-25 filter-btn">Closed</button>
          </div>

          <div>
            <div class="join space-x-3">
              <div>
                <label class="input validator join-item rounded-md">
                  <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                  <input type="text" placeholder="Search issues..." required />
                </label>
              </div>
              <button class="btn btn-primary join-item rounded-md w-24">
                Search
              </button>
            </div>
          </div>
        </div>

        <!-- Issue  Container count  -->
        <div
          class="flex flex-col lg:flex-row items-center gap-7 justify-between bg-white p-7 mt-5 shadow-sm border-b border-gray-200"
        >
          <div class="flex gap-2 items-center">
            <div class="bg-[#ece4ff] p-3 rounded-full">
              <img class="w-9 h-9" src="./assets/Aperture.png" alt="" />
            </div>
            <div class="flex flex-col">
              <p id="issue-count" class="text-2xl font-semibold">50 Issues</p>
              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-5">
            <div class="flex gap-2">
              <span><i class="fa-solid fa-circle text-green-600"></i></span>
              <p>Open</p>
            </div>
            <div class="flex gap-2">
              <span><i class="fa-solid fa-circle text-[#a855f7]"></i></span>
              <p>Closed</p>
            </div> <img src="./assets/Closed- Status .png" alt="">
          </div>
        </div>

        <!-- All Card Issue All Card Issue All Card Issue -->
        <div class="bg-gray-50 shadow-sm pt-5">
          <div class="w-29/30 mx-auto">
            <div
              id="allIssueCardContainer"
              class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mx-auto"
            >

            </div>
            
          </div>
        </div>
      </div>
    </main>


    
    <!-- details of the card  -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div id="details-container" class="modal-box max-w-2xl">
        <div  class="flex flex-col gap-5">
          <h1 class="text-2xl font-bold">Fix broken image uploads</h1>
          <div class="flex gap-2 text-sm items-center">
            <div class="badge badge-success rounded-full">Opened</div>
            <p class="rounded-full h-1 w-1 bg-[#888]"></p>
            <p>Opened by Fahim Ahmed</p>
            <p class="rounded-full h-1 w-1 bg-[#888]"></p>
            <p>22/02/2026</p>
          </div>
          <div class="flex">
            <div class="badge badge-soft badge-error">Error</div>
            <div class="badge badge-soft badge-warning">Warning</div>
          </div>
          <p>The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
          <div class="flex justify-between bg-gray-100 p-5 rounded-md">
          <div class="w-100">
            <p>Assignee:</p>
            <p class="font-bold">Fahim Ahmed</p>
          </div>
          <div class="w-100">
            <p>Priority:</p>
            <div class="badge badge-error">Error</div>
          </div>
        </div>
        </div>
        
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./home.js"></script>
  </body>
</html>
