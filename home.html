<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue</title>
    <link rel="icon" href="./assets/github-logo.png" />

    <!-- daisy Ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina+2:wght@400..800&family=Comfortaa:wght@300..700&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body>
    <main class="bg-slate-100 min-h-screen pt-15">
      <div class="w-9/12 mx-auto">
        <!-- Nav Btn Nav Btn Nav Btn Nav Btn  -->
        <div
          class="flex bg-white rounded-lg items-center justify-between p-7 shadow-sm"
        >
          <div class="flex gap-3">
            <button class="btn btn-primary w-25">All</button>
            <button class="btn w-25">Open</button>
            <button class="btn w-25">Closed</button>
          </div>

          <div>
            <div class="join space-x-3">
              <div>
                <label class="input validator join-item">
                  <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                  <input
                    class="rounded-md"
                    type="text"
                    placeholder="Search issues..."
                    required
                  />
                </label>
              </div>
              <button class="btn btn-primary join-item rounded-md w-24">
                Search
              </button>
            </div>
          </div>
        </div>

        <!-- Issue  Container count  -->
        <div
          class="flex items-center justify-between bg-white p-7 mt-5 shadow-sm border-b border-gray-200"
        >
          <div class="flex gap-2 items-center">
            <div class="bg-[#ece4ff] p-3 rounded-full">
              <img class="w-9 h-9" src="./assets/Aperture.png" alt="" />
            </div>
            <div class="flex flex-col">
              <p class="text-2xl font-semibold">50 Issues</p>
              <p class="text-gray-300">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-5">
            <div class="flex gap-2">
              <span><i class="fa-solid fa-circle text-green-600"></i></span>
              <p>Open</p>
            </div>
            <div class="flex gap-2">
              <span><i class="fa-solid fa-circle text-[#a855f7]"></i></span>
              <p>Closed</p>
            </div>
          </div>
        </div>

        <!-- All Card Issue All Card Issue All Card Issue -->
        <div class="bg-gray-50 shadow-sm pt-5">
          <div class="w-29/30 bg-slate-500 mx-auto">
            <div class=" grid grid-cols-4 gap-4 mx-auto">
            <!-- Card  -->
            <div class="flex flex-col text-left p-7 col-span-1 bg-white shadow-md rounded-md space-y-3 ">
              <div class="flex justify-between">
                <img src="/assets/Open-Status.png" alt="" />
                <div class="badge badge-error  text-white">
                  High
                </div>
              </div>
              <p class="font-semibold text-lg">
                Fix navigation menu on mobile devices
              </p>
              <p class="text-sm line-clamp-2 text-">
                The navigation menu doesn't collapse properly on mobile
                devices...
              </p>
              <div class="flex gap-4">
                <div class="badge badge-outline badge-error">Error</div>
                <div class="badge badge-outline badge-warning">Warning</div>
              </div>
              <div class="border-gray-300 border-t -mx-7"></div>
              <p class="text-sm">#1by john_doe</p>
              <p class="text-sm">1/15/2024</p>
            </div> 
            
          </div>
          </div>
        </div>
      </div>
    </main>

    <script src="./"></script>
  </body>
</html>
